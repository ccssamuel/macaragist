<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>
  <!-- crane hook shape in amber -->
  <!-- vertical mast -->
  <rect x="14" y="3" width="3" height="18" fill="#E87B1E"/>
  <!-- horizontal boom -->
  <rect x="6" y="3" width="20" height="3" fill="#E87B1E"/>
  <!-- hook cable -->
  <rect x="22" y="6" width="2" height="10" fill="#E87B1E"/>
  <!-- hook curve -->
  <path d="M20 16 Q18 22 22 24 Q26 24 26 20"
        stroke="#E87B1E" stroke-width="2.5"
        fill="none" stroke-linecap="round"/>
  <!-- counterweight -->
  <rect x="6" y="3" width="6" height="5" fill="#c4620e" rx="1"/>
</svg>
